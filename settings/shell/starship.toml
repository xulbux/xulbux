# ~/.config/starship.toml

add_newline = true
command_timeout = 2500
format = """\
[Ôò¡ÔöÇ](bright-black) \
$username$hostname$os\
$directory$git_branch\
$cmd_duration
$character"""

[character]
success_symbol = '[\$](bold bright-blue)'
error_symbol = '[\$](bold red)'

####################################################################################################

[username]
disabled = false
show_always = true
style_user = 'bold bright-white'
style_root = 'italic bright-white'
format = '[$user]($style) '

[hostname]
disabled = false
ssh_only = false
style = 'bold bright-blue'
format = 'on [$hostname]($style) '

[os]
disabled = false
format = '[$symbol](bold blue) '
[os.symbols]
Arch = '¾░úç'
Linux = '¯»å'
Ubuntu = '¯»ë'
Fedora = '¾░úø'
Debian = '¾░úÜ'
Macos = '¾░ÇÁ'
Windows = '¾░û│'

[directory]
truncation_length = 1
truncation_symbol = 'ÔÇĞ/'
home_symbol = '´ôó ~'
read_only_style = '197'
read_only = ' ´Çú '
style = 'bold cyan'
format = 'at [$path]($style)[$read_only]($read_only_style) '

[git_branch]
truncation_length = 20
truncation_symbol = 'ÔÇĞ/'
symbol = '´Éİ '
style = 'bold white'
format = 'via [$symbol$branch]($style) '

[cmd_duration]
min_time = 0
